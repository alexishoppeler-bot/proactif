<!DOCTYPE html>
<html lang="fr-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cherche et clique - AH</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/pages/cherche-clique.css">
</head>
<body>
  <div id="header-slot"></div>
  <div id="sidebar-slot"></div>

  <div class="layout">
    <main class="main">
      <div class="container">

        <div class="page-header fade-up">
          <div class="page-icon">🔍</div>
          <h1>Cherche et clique</h1>
          <p>Reconnaissez les icônes et cliquez sur celle demandée. Testez votre vitesse de repérage.</p>
        </div>

        <!-- KPI en temps réel -->
        <div class="kpi-grid fade-up delay-1">
          <div class="kpi-card">
            <div class="kpi-value" id="ccCorrect">0</div>
            <div class="kpi-label">Trouvées</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="ccErrors">0</div>
            <div class="kpi-label">Erreurs</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="ccXp">0 XP</div>
            <div class="kpi-label">XP gagné</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="ccAcc">0%</div>
            <div class="kpi-label">Précision</div>
          </div>
        </div>

        <!-- Zone cible -->
        <div class="target-zone fade-up delay-2">
          <div class="target-label">Cliquez sur :</div>
          <div class="target-text" id="targetName">Loupe</div>
        </div>

        <!-- Grille de jeu -->
        <div class="fade-up delay-2" id="gameZone">
          <div class="game-grid" id="gameGrid"></div>
        </div>

        <!-- Zone résultats -->
        <div class="result-zone fade-up" id="resultZone">
          <div class="card card-accent card-lg" style="text-align:center;">
            <div id="resEmoji" style="font-size:48px;margin-bottom:12px;">🎉</div>
            <h2 id="resTitle">Session terminée !</h2>
            <p id="resSubtitle" style="color:var(--text2);margin-bottom:16px;"></p>
            <div class="kpi-grid">
              <div class="kpi-card">
                <div class="kpi-value" style="color:var(--success)" id="resFinal">0</div>
                <div class="kpi-label">Trouvées</div>
              </div>
              <div class="kpi-card">
                <div class="kpi-value" style="color:var(--danger)" id="resFinalErr">0</div>
                <div class="kpi-label">Erreurs</div>
              </div>
              <div class="kpi-card">
                <div class="kpi-value" id="resFinalXp">0 XP</div>
                <div class="kpi-label">XP gagné</div>
              </div>
              <div class="kpi-card">
                <div class="kpi-value" id="resFinalAcc">0%</div>
                <div class="kpi-label">Précision</div>
              </div>
            </div>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px;">
              <button class="btn btn-primary" id="btnRestart" type="button">🔄 Rejouer</button>
              <button class="btn btn-secondary" id="btnNextExercise" type="button">Exercice suivant →</button>
              <a href="accueil.html" class="btn btn-secondary">← Accueil</a>
            </div>
          </div>
        </div>

      </div>
    </main>
    <div id="footer-slot"></div>
  </div>

  <script src="../js/data/cherche-clique-data.js"></script>
  <script src="../js/score.js"></script>
  <script src="../js/exercises-config.js"></script>
  <script src="../js/stages.js"></script>
  <script src="../js/exercise-utils.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/ui.js"></script>
  <script>
  'use strict';
  const PAGE_ID = 'cherche-clique';
  const TOTAL_QUESTIONS = 10;

  let session = {
    correct: 0,
    errors: 0,
    xp: 0,
    questionCount: 0,
    active: true
  };

  let itemOrder = [];
  let targetIndex = -1;

  /* ── Mettre à jour les KPI ── */
  function updateKpi() {
    document.getElementById('ccCorrect').textContent = session.correct;
    document.getElementById('ccErrors').textContent = session.errors;
    document.getElementById('ccXp').textContent = session.xp + ' XP';
    const accuracy = session.correct + session.errors > 0
      ? Math.round((session.correct / (session.correct + session.errors)) * 100)
      : 0;
    document.getElementById('ccAcc').textContent = accuracy + '%';
  }

  /* ── Initialiser le jeu ── */
  function initGame() {
    const data = window.CHERCHE_CLIQUE_DATA || [];
    itemOrder = shuffle(data);
    session = { correct: 0, errors: 0, xp: 0, questionCount: 0, active: true };
    updateKpi();
    renderGrid();
    nextQuestion();
    startExerciseSession(PAGE_ID);
  }

  /* ── Shuffle ── */
  function shuffle(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  /* ── Rendre la grille ── */
  function renderGrid() {
    const grid = document.getElementById('gameGrid');
    grid.innerHTML = '';
    const subset = shuffle(itemOrder).slice(0, 16);
    subset.forEach((item, idx) => {
      const el = document.createElement('div');
      el.className = 'game-item';
      el.innerHTML = `<div>${item.icon}</div><div class="game-label">${item.label}</div>`;
      el.addEventListener('click', () => handleClick(item, el));
      grid.appendChild(el);
    });
  }

  /* ── Question suivante ── */
  function nextQuestion() {
    if (session.questionCount >= TOTAL_QUESTIONS) {
      endSession();
      return;
    }
    session.questionCount++;
    targetIndex = Math.floor(Math.random() * itemOrder.length);
    const target = itemOrder[targetIndex];
    document.getElementById('targetName').textContent = target.label;
  }

  /* ── Gérer le clic ── */
  function handleClick(item, element) {
    if (!session.active) return;
    const target = itemOrder[targetIndex];

    if (item.id === target.id) {
      // Correct !
      session.correct++;
      session.xp += 3;
      element.classList.add('correct');
      recordExerciseProgress(PAGE_ID, { correct: 1, typed: 1, errors: 0, xp: 3 });
      updateKpi();
      setTimeout(() => {
        element.classList.remove('correct');
        renderGrid();
        nextQuestion();
      }, 600);
    } else {
      // Erreur
      session.errors++;
      element.classList.add('wrong');
      recordExerciseProgress(PAGE_ID, { correct: 0, typed: 1, errors: 1, xp: 0 });
      updateKpi();
      setTimeout(() => {
        element.classList.remove('wrong');
      }, 300);
    }
  }

  /* ── Terminer la session ── */
  function endSession() {
    session.active = false;
    document.getElementById('gameZone').classList.add('hidden');
    document.getElementById('resultZone').classList.add('show');

    const accuracy = session.correct + session.errors > 0
      ? Math.round((session.correct / (session.correct + session.errors)) * 100)
      : 0;

    let emoji = '📚';
    let title = 'Continue à t\'entraîner !';
    if (accuracy === 100) { emoji = '🏆'; title = 'Parfait ! Score 100% !'; }
    else if (accuracy >= 80) { emoji = '🎉'; title = 'Excellent !'; }
    else if (accuracy >= 60) { emoji = '👍'; title = 'Très bien !'; }
    else if (accuracy >= 40) { emoji = '😐'; title = 'Pas mal !'; }

    document.getElementById('resEmoji').textContent = emoji;
    document.getElementById('resTitle').textContent = title;
    document.getElementById('resSubtitle').textContent =
      `Tu as trouvé ${session.correct}/${TOTAL_QUESTIONS} icônes. Précision : ${accuracy}%`;

    document.getElementById('resFinal').textContent = session.correct;
    document.getElementById('resFinalErr').textContent = session.errors;
    document.getElementById('resFinalXp').textContent = session.xp + ' XP';
    document.getElementById('resFinalAcc').textContent = accuracy + '%';

    if (accuracy >= 80) launchConfetti();

    endExerciseSession(PAGE_ID);

    // Bouton suivant
    const nextEx = getNextExercise(PAGE_ID);
    const btnNext = document.getElementById('btnNextExercise');
    if (nextEx && nextEx.href) {
      btnNext.textContent = 'Exercice suivant : ' + nextEx.name + ' →';
      btnNext.onclick = () => window.location.href = nextEx.href;
    } else {
      btnNext.style.display = 'none';
    }
  }

  /* ── Bouton Rejouer ── */
  document.getElementById('btnRestart').addEventListener('click', () => {
    document.getElementById('resultZone').classList.remove('show');
    document.getElementById('gameZone').classList.remove('hidden');
    initGame();
  });

  /* ── Lancer le jeu au démarrage ── */
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof StageManager !== 'undefined' && typeof ScoreManager !== 'undefined') {
      initGame();
    } else {
      setTimeout(() => initGame(), 100);
    }
  });

  // Partage de résultats
  document.addEventListener('DOMContentLoaded', () => {
    attachShareButtons();
  });
  </script>
</body>
</html>
